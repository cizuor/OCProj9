services:

 postgres-db:
      image: postgres:15-alpine
      container_name: postgres_db_chatpoc
      environment:
        POSTGRES_DB: chatpoc
        POSTGRES_USER: ${DB_USERNAME}
        POSTGRES_PASSWORD: ${DB_PASSWORD} # Mot de passe simple pour le dev local
      ports:
        - "5432:5432" 
      volumes:
        - postgres-data:/var/lib/postgresql/data # Permet de garder les données même si on coupe Docker
      restart: unless-stopped

 backend:
      build: ./chatpoc 
      container_name: spring_api_chatpoc
      ports:
        - "8080:8080"
      depends_on:
        - postgres-db # On attend que la BDD soit prête
      environment:
        - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/chatpoc
        - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
        - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
        - JWT_SECRET_KEY=${JWT_KEY}
        - SUPPORT_PWD=${SUPPORT_PASSWORD}
 frontend:
    build: ./chat-poc-front
    container_name: angular_front_chatpoc
    ports:
      - "4200:80" # On garde 4200 pour ne rien changer à tes habitudes
    depends_on:
      - backend


  

volumes:
  postgres-data: