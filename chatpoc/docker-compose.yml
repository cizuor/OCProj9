services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres_db_chatpoc
    environment:
      POSTGRES_DB: chatpoc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123 # Mot de passe simple pour le dev local
    ports:
      - "5432:5432" 
    volumes:
      - postgres-data:/var/lib/postgresql/data # Permet de garder les données même si on coupe Docker
    restart: unless-stopped

  api-server:
    build: . 
    container_name: spring_api_chatpoc
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db # On attend que la BDD soit prête
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/chatpoc
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password123

  

volumes:
  postgres-data: